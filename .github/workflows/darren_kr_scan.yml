# ============================================================
# 데런식 KR 주말 스캔 — GitHub Actions 워크플로우
# ============================================================
# ⚠️ 참고: 이 파일은 US 버전(darren_scan.yml)과 구조가 동일하다는 전제로
#          재구성한 것입니다. 저장소의 실제 darren_kr_scan.yml과 cron 시각/
#          스크립트 파일명이 다르면 알려주세요 — "변화 리포트", "차트 버튼",
#          "상태 커밋" 스텝만 실제 파일에 그대로 옮기면 됩니다.
#
# 실행 시각: 매주 금요일 23:00 UTC = 한국시간 토요일 오전 8시
# 수동 실행: GitHub 저장소 → Actions 탭 → 이 워크플로우 → Run workflow 버튼
#
# 주의: 상태 파일 커밋을 위해 permissions: contents: write 가 필요합니다.
# ============================================================

name: Darren KR Weekend Scan

on:
  schedule:
    - cron: "0 23 * * 5"   # 매주 금요일 23:00 UTC (KST 토요일 08:00)
  workflow_dispatch:

permissions:
  contents: write           # state/ 상태 파일 커밋용

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install yfinance pandas requests

      - name: 데런식 스캔 실행
        env:
          DARREN_TG_TOKEN: ${{ secrets.DARREN_TG_TOKEN }}
          DARREN_TG_CHAT: ${{ secrets.DARREN_TG_CHAT }}
        run: python darren_kr_screener.py

      - name: 스캔 변화 리포트 전송 (추가/유지/제외)
        env:
          DARREN_TG_TOKEN: ${{ secrets.DARREN_TG_TOKEN }}
          DARREN_TG_CHAT: ${{ secrets.DARREN_TG_CHAT }}
          MARKET: KR
        run: python send_diff_report.py

      - name: 종목별 차트 버튼 메시지 전송
        env:
          DARREN_TG_TOKEN: ${{ secrets.DARREN_TG_TOKEN }}
          DARREN_TG_CHAT: ${{ secrets.DARREN_TG_CHAT }}
          MARKET: KR
        run: python send_chart_buttons.py

      - name: 비교용 상태 파일 커밋
        run: |
          if [ ! -f "state/last_kr_tickers.txt" ]; then
            echo "상태 파일 없음 - 커밋 생략"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          if git diff --staged --quiet; then
            echo "변경 없음 - 커밋 생략"
          else
            git commit -m "chore: KR 스캔 상태 업데이트 [skip ci]"
            git push || (git pull --rebase && git push)
          fi

      - name: 결과 CSV 아티팩트 업로드 (30일 보관)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: darren-kr-watchlist-csv
          path: darren_kr_watchlist_*.csv
          retention-days: 30
          if-no-files-found: ignore
